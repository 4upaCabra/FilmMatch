services:
  db:
    image: postgres:15-alpine
    container_name: movie_matcher_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: movie_matcher_api
    restart: always
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TMDB_BEARER_TOKEN: ${TMDB_BEARER_TOKEN}
      TMDB_PROXY_URL: ${TMDB_PROXY_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      app_network:
        aliases:
          - backend
    command: >
      sh -c "python migrate.py && uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"

  frontend:
    build: ./frontend
    container_name: movie_matcher_ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
